services:
  - type: web
    name: la-kers-api
    runtime: node
    buildCommand: npm ci --include=dev && npm --workspace backend run build
    startCommand: npm --workspace backend run start
    healthCheckPath: /ready
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MINIMAL_MODE
        value: true
      - key: TRUST_PROXY
        value: true
      - key: ENABLE_CRON_JOBS
        value: false
      - key: ENABLE_TENANT_PORTAL
        value: false
      - key: ENABLE_DASHBOARD_REALTIME
        value: false
      - key: BILLING_MODE
        value: manual
      - key: REQUEST_BODY_LIMIT
        value: 1mb
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: la-kers-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: LANDLORD_NAME
        sync: false
      - key: LANDLORD_IDENTIFICATION
        sync: false
      - key: LANDLORD_ADDRESS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ID_PRO_YEARLY
        sync: false
      - key: BILLING_CONTACT_EMAIL
        sync: false

  - type: web
    name: la-kers-web
    runtime: static
    buildCommand: npm ci && npm --workspace frontend run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_MINIMAL_MODE
        value: true
      - key: VITE_ENABLE_TENANT_PORTAL
        value: false
      - key: VITE_ENABLE_DASHBOARD_REALTIME
        value: false
      - key: VITE_API_BASE
        fromService:
          type: web
          name: la-kers-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
