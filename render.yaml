services:
  - type: web
    name: la-kers-api
    runtime: node
    buildCommand: npm ci && npm --workspace backend run build
    startCommand: npm --workspace backend run start
    healthCheckPath: /health
    disk:
      name: documents
      mountPath: /opt/render/project/src/backend/documents
      sizeGB: 10
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: true
      - key: ENABLE_CRON_JOBS
        value: true
      - key: REQUEST_BODY_LIMIT
        value: 1mb
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
      - key: DOCUMENT_STORAGE_PATH
        value: /opt/render/project/src/backend/documents
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: static
          name: la-kers-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: LANDLORD_NAME
        sync: false
      - key: LANDLORD_IDENTIFICATION
        sync: false
      - key: LANDLORD_ADDRESS
        sync: false

  - type: static
    name: la-kers-web
    buildCommand: npm ci && npm --workspace frontend run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE
        fromService:
          type: web
          name: la-kers-api
          envVarKey: RENDER_EXTERNAL_URL
